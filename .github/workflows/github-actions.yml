name: SNS Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '17 */5 * * *'

permissions:
  contents: read
  actions: write

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  run-python:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: install python packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(python -c "import playwright; print(playwright.__version__)")" >> $GITHUB_OUTPUT

    - name: Cache Playwright browsers
      uses: actions/cache@v3
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        playwright install chromium

    - name: Make envfile
      uses: SpicyPizza/create-envfile@v2.0
      with:
        envkey_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        envkey_FIREBASE_ADMIN_KEY: ${{ secrets.FIREBASE_ADMIN_KEY }}
        envkey_YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
        envkey_MELON_TOP100_CHART_URL: ${{ vars.MELON_TOP100_CHART_URL }}
        envkey_MELON_HOT100_CHART_URL: ${{ vars.MELON_HOT100_CHART_URL }}
        envkey_MELON_DAILY_CHART_URL: ${{ vars.MELON_DAILY_CHART_URL }}
        envkey_MELON_WEEKLY_CHART_URL: ${{ vars.MELON_WEEKLY_CHART_URL }}
        envkey_MELON_MONTHLY_CHART_URL: ${{ vars.MELON_MONTHLY_CHART_URL }}

    - name: Install GitHub CLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg |
          sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" |
          sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh -y

    - name: Run bot and schedule takeover
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -u main.py &
        BOT_PID=$!

        (
          sleep $((5 * 60 * 60 + 20 * 60))
          gh workflow run github-actions.yml --ref main
        ) &
        HANDOFF_PID=$!

        wait -n "$BOT_PID" "$HANDOFF_PID"

        if ! kill -0 "$HANDOFF_PID" 2>/dev/null; then
          wait "$HANDOFF_PID"
          HANDOFF_STATUS=$?
          if [ "$HANDOFF_STATUS" -ne 0 ]; then
            kill "$BOT_PID" 2>/dev/null || true
            wait "$BOT_PID" 2>/dev/null || true
            exit "$HANDOFF_STATUS"
          fi

          wait "$BOT_PID"
          exit $?
        fi

        kill "$HANDOFF_PID" 2>/dev/null || true
        wait "$BOT_PID"
